<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MISSION COMPLETE - SYSTEM TERMINATED</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Outfit:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f43f5e; --bg-dark: #020617; }
        
        body { 
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            font-family: 'Outfit', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100dvh; 
            margin: 0; 
            text-align: center; 
            overflow: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .glass-panel { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 3rem 1.5rem; 
            border-radius: 2rem; 
            max-width: 380px; 
            width: 90%; 
            z-index: 10; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(244, 63, 94, 0.1);
            color: var(--primary);
            border-radius: 2rem;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(244, 63, 94, 0.3);
        }

        h1 { font-family: 'Inter', sans-serif; font-size: 1.8rem; margin-bottom: 1.5rem; color: #fff; line-height: 1.3; font-weight: 900; }

        .message-box { 
            text-align: left; 
            font-size: 1.05rem; 
            line-height: 1.7; 
            color: #cbd5e1; 
            margin-bottom: 2.5rem;
            padding: 1rem;
            border-left: 3px solid var(--primary);
        }

        #destruct-section { display: none; }

        .countdown { 
            font-family: 'Inter', sans-serif; 
            font-size: 8rem; 
            font-weight: 900; 
            color: #fff; 
            margin: 0.5rem 0; 
            text-shadow: 0 0 30px var(--primary); 
            line-height: 1;
        }

        .btn-ios { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 1.4rem; 
            font-size: 1.3rem; 
            font-weight: 800; 
            cursor: pointer; 
            width: 100%; 
            border-radius: 1.2rem;
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.4);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-ios:active { transform: scale(0.96); opacity: 0.9; }

        #explosion-layer { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 100; display: none; background-size: cover; background-position: center; }
        #flash { position: fixed; top:0; left:0; width:100%; height:100%; background: #fff; z-index: 101; opacity: 0; pointer-events: none; }

        @keyframes shake { 0% { transform: translate(0,0); } 10% { transform: translate(-5px, 5px); } 20% { transform: translate(5px, -5px); } 100% { transform: translate(0,0); } }
        .shaking { animation: shake 0.1s infinite; }
    </style>
</head>
<body>
    <div class="glass-panel" id="main-container">
        <div id="auth-section">
            <div class="status-badge">FINAL MISSION</div>
            <h1>期中考特訓已圓滿達成任務</h1>
            <div class="message-box">
                本測驗網頁為《閱讀英文學文化》，專為期中考特訓所生。<br><br>
                考試結束，請同學回到「創課」繼續認真學習。為期末考努力奮鬥。<br><br>
                本區將在 10 秒後進行銷毀。
            </div>
            <button class="btn-ios" id="start-btn">執行銷毀程序</button>
        </div>

        <div id="destruct-section">
            <div style="color:var(--primary); font-weight:900; font-size:0.9rem; letter-spacing:4px; margin-bottom:1rem;">SYSTEM TERMINATING...</div>
            <div class="countdown" id="count-num">10</div>
            <div style="font-size:0.9rem; color:#94a3b8;">SYSTEM SECURE SHUTDOWN</div>
        </div>
    </div>

    <div id="explosion-layer"></div>
    <div id="flash"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const countDisplay = document.getElementById('count-num');
        const expAudio = new Audio('https://www.soundjay.com/explosion/sounds/explosion-02.mp3');
        const beepAudio = new Audio('https://www.soundjay.com/buttons/sounds/beep-07.mp3');
        const englishNumbers = ["Zero", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten"];

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 1.0; msg.pitch = 0.5;
            window.speechSynthesis.speak(msg);
        }

        startBtn.onclick = () => {
            beepAudio.play().then(() => { beepAudio.pause(); beepAudio.currentTime = 0; });
            expAudio.play().then(() => { expAudio.pause(); expAudio.currentTime = 0; });
            speak("Initiating");

            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('destruct-section').style.display = 'block';
            
            let c = 10;
            const timer = setInterval(() => {
                countDisplay.innerText = c;
                speak(englishNumbers[c]);
                beepAudio.currentTime = 0;
                beepAudio.play().catch(()=>{});

                if (c <= 3) document.body.classList.add('shaking');

                if (c === 0) {
                    clearInterval(timer);
                    setTimeout(() => {
                        document.getElementById('flash').style.opacity = '1';
                        expAudio.play();
                        setTimeout(() => {
                            document.getElementById('explosion-layer').style.backgroundImage = "url('https://media.giphy.com/media/HhTXt43pk1I1W/giphy.gif')";
                            document.getElementById('explosion-layer').style.display = 'block';
                            document.getElementById('flash').style.opacity = '0';
                            document.getElementById('main-container').style.display = 'none';
                            setTimeout(() => {
                                document.getElementById('explosion-layer').innerHTML = '<div style="color:white; font-size:2rem; font-weight:900; margin-top:42vh; text-shadow:0 0 20px #f00;">測驗網頁已銷毀</div><div style="color:#fff; font-size:1.4rem; margin-top:20px; font-weight:bold;">為期末考努力奮鬥</div><p style="color:#ccc; font-size:0.9rem;">請回到創課繼續認真學習</p>';
                            }, 3000);
                        }, 100);
                    }, 800);
                }
                c--;
            }, 1000);
        };
        window.onload = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
