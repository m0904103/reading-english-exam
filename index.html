
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閱讀英文學文化 - 模擬測驗</title>
    <style>
        :root {
            --primary: #818cf8; --secondary: #c084fc; --bg: #0f172a;
            --card-bg: #1e293b; --text: #f8fafc; --success: #22c55e; --error: #ef4444;
        }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { max-width: 480px; width: 100%; }
        .header { text-align: center; margin-bottom: 10px; }
        .progress-bar {
            width: 100%; height: 6px; background: #334155; border-radius: 10px; margin-bottom: 20px; overflow: hidden;
        }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.3s; }
        .quiz-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .q-img { width: 100%; border-radius: 12px; margin-bottom: 15px; max-height: 220px; object-fit: cover; }
        .badge { background: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .q-text { font-size: 1.15rem; font-weight: 600; margin: 15px 0; line-height: 1.5; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .opt { background: #334155; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .opt.correct { border-color: var(--success); background: rgba(34, 197, 94, 0.1); }
        .opt.wrong { border-color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .exp { margin-top: 15px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; display: none; font-size: 0.9rem; border-left: 3px solid var(--primary); line-height: 1.6; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--primary); color: white; border: none; font-weight: bold; margin-top: 15px; display: none; cursor: pointer; }
        .res { display: none; text-align: center; }
        .score-val { font-size: 4rem; font-weight: bold; color: var(--primary); }
        .mis-item { text-align: left; background: #334155; padding: 12px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--error); }
    </style>
</head>
<body>

                <p style="opacity: 0.7; font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px;">
                    歡迎來到期中模擬練習系統。<br>
                    本測驗包含 Unit 1 - 9 完整題庫，<br>

                </p>
                <button class="btn" style="display: block; width: 100%; padding: 18px; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(129, 140, 248, 0.4);" onclick="startQuiz()">

        </div>

    <script>
        // --- 1. 音效與語音核心系統 (移至最上方確保穩定) ---
        var audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 強制解鎖手機瀏覽器音效限制 (播放極短的無聲音頻)
        function unlockAudio() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            gain.gain.value = 0; // 設定為靜音
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.001);
        }

        function playSound(type) {
            initAudio(); // 確保每次播放前引擎都是醒著的
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(220, now);
                osc.frequency.exponentialRampToValueAtTime(110, now + 0.2);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        const data = [{"unit": "Unit 1", "question": "What is the main idea conveyed by the phrase 'potato, potato'?", "options": ["A) Importance of a balanced diet", "B) Agricultural diversity", "C) Pronunciation differences are inconsequential"], "answer": 2, "explanation": "\u9019\u500b\u7247\u8a9e\u610f\u601d\u662f\u6307\u5169\u4ef6\u4e8b\u96d6\u7136\u8aaa\u6cd5\u4e0d\u540c\uff0c\u4f46\u672c\u8cea\u662f\u4e00\u6a23\u7684\uff0c\u5dee\u5225\u4e26\u4e0d\u91cd\u8981\u3002", "image": "unit1.png"}, {"unit": "Unit 1", "question": "In what context might you hear 'potato, potato'?", "options": ["A) Cooking class", "B) Acknowledging different pronunciations with the same meaning", "C) Debate about preparing potatoes"], "answer": 1, "explanation": "\u7576\u5169\u500b\u4eba\u767c\u97f3\u4e0d\u540c\u4f46\u7406\u89e3\u4e00\u81f4\u6642\uff0c\u5e38\u7528\u6b64\u53e5\u8868\u793a\u6c92\u5dee\u3002", "image": "u1q2.png"}, {"unit": "Unit 1", "question": "Which best describes the function of 'potato, potato'?", "options": ["A) Variations in pronunciation do not change the message", "B) Cultural significance of potatoes", "C) Linguistic phenomenon of homophones"], "answer": 0, "explanation": "\u5f37\u8abf\u8a9e\u8a00\u7684\u591a\u6a23\u6027\u4e0d\u5f71\u97ff\u6838\u5fc3\u8a0a\u606f\u7684\u50b3\u905e\u3002", "image": "u1q3.png"}, {"unit": "Unit 1", "question": "Where does the expression 'potato, potato' come from?", "options": ["A) 'Let's Get It Started'", "B) 'Let's Call the Whole Thing Off'", "C) 'Let's Get It On'"], "answer": 1, "explanation": "\u4f86\u81ea 1937 \u5e74\u7d93\u5178\u6b4c\u66f2 'Let's Call the Whole Thing Off'\u3002", "image": "u1q4.png"}, {"unit": "Unit 1", "question": "'Fall' is American English. What is the British English equivalent?", "options": ["A) summer", "B) autumn", "C) winter"], "answer": 1, "explanation": "\u7f8e\u5f0f\u7528 Fall\uff0c\u82f1\u5f0f\u7528 Autumn\uff0c\u7686\u6307\u79cb\u5929\u3002", "image": "u1q5.png"}, {"unit": "Unit 2", "question": "What message does 'Reading can seriously damage your ignorance' convey?", "options": ["A) Reading harms knowledge", "B) Reading is beneficial for combating ignorance", "C) Ignorance is dangerous for reading"], "answer": 1, "explanation": "\u9019\u662f\u4e00\u53e5\u5e7d\u9ed8\u7684\u8a71\uff0c\u610f\u601d\u662f\u300c\u95b1\u8b80\u6703\u7834\u58de\u4f60\u7684\u7121\u77e5\u300d\uff0c\u4e5f\u5c31\u662f\u589e\u9577\u898b\u805e\u3002", "image": "unit2.png"}, {"unit": "Unit 2", "question": "Which best describes the Extensive Reading Approach?", "options": ["A) Small amounts in depth", "B) Complex texts with grammar focus", "C) Large quantities for comprehension and enjoyment"], "answer": 2, "explanation": "\u6cdb\u8b80\uff08Extensive Reading\uff09\u5f37\u8abf\u5927\u91cf\u95b1\u8b80\u4ee5\u7372\u5f97\u6574\u9ad4\u7406\u89e3\u8207\u6a02\u8da3\u3002", "image": "u2q2.png"}, {"unit": "Unit 2", "question": "Characteristic of successful extensive reading?", "options": ["A) Reading is its own reward", "B) Teacher/parent is a role model", "C) All of the above"], "answer": 2, "explanation": "\u6210\u529f\u7684\u6cdb\u8b80\u8a08\u756b\u5305\u62ec\u8208\u8da3\u9a45\u52d5\u8207\u699c\u6a23\u5f15\u5c0e\u3002", "image": "u2q3.png"}, {"unit": "Unit 2", "question": "How can reading skills be promoted?", "options": ["A) By writing", "B) By listening", "C) By reading"], "answer": 2, "explanation": "\u8981\u63d0\u5347\u95b1\u8b80\u80fd\u529b\uff0c\u6700\u597d\u7684\u65b9\u5f0f\u5c31\u662f\u300c\u5927\u91cf\u95b1\u8b80\u300d\u3002", "image": "u2q4.png"}, {"unit": "Unit 2", "question": "Why learn about academic quotations?", "options": ["A) To impress others", "B) To avoid plagiarism and give credit", "C) None of the above"], "answer": 1, "explanation": "\u5f15\u7528\u662f\u70ba\u4e86\u5c0a\u91cd\u539f\u4f5c\u8005\u4e26\u907f\u514d\u527d\u7aca\u3002", "image": "u2q5.png"}, {"unit": "Unit 3", "question": "Recommended vocabulary size for general reading comprehension?", "options": ["A) 1,000 word families", "B) 3,000 word families (5,000 items)", "C) 10,000 word families"], "answer": 1, "explanation": "\u9019\u88ab\u7a31\u70ba\u95b1\u8b80\u7406\u89e3\u7684\u300c\u9580\u6abb\u6c34\u5e73\u300d\uff08Threshold level\uff09\u3002", "image": "unit3.png"}, {"unit": "Unit 3", "question": "Likelihood of remembering a word encountered more than 18 times?", "options": ["A) 10-15%", "B) 20-25%", "C) 30-35%"], "answer": 2, "explanation": "\u91cd\u8907\u9047\u5230\u591a\u6b21\uff08\u598218\u6b21\u4ee5\u4e0a\uff09\u80fd\u986f\u8457\u63d0\u5347\u55ae\u5b57\u8a18\u61b6\u7387\u3002", "image": "u3q2.png"}, {"unit": "Unit 3", "question": "What principle is recommended for evaluating reading materials?", "options": ["A) 80-85% principle", "B) 90-95% principle", "C) 95-98% principle"], "answer": 2, "explanation": "\u7406\u60f3\u7684\u95b1\u8b80\u6750\u6599\u61c9\u5305\u542b 95-98% \u7684\u5df2\u77e5\u55ae\u5b57\uff0c\u624d\u4e0d\u6703\u56e0\u592a\u96e3\u800c\u632b\u6298\u3002", "image": "u3q3.png"}, {"unit": "Unit 3", "question": "Recommended daily time for effective reading practice?", "options": ["A) 5-10 minutes", "B) 15-30 minutes", "C) 45-60 minutes"], "answer": 1, "explanation": "\u6bcf\u5929\u6301\u4e4b\u4ee5\u6046\u95b1\u8b80 15-30 \u5206\u9418\u6700\u6709\u6548\u3002", "image": "u3q4.png"}, {"unit": "Unit 3", "question": "Activities recommended for learners to improve vocabulary?", "options": ["A) Reading novels only", "B) Watching movies only", "C) Both reading and watching movies"], "answer": 2, "explanation": "\u591a\u6a23\u5316\u7684\u8f38\u5165\uff08\u95b1\u8b80\u8207\u5f71\u97f3\uff09\u80fd\u66f4\u5168\u9762\u5730\u63d0\u5347\u8a5e\u5f59\u529b\u3002", "image": "u3q5.png"}, {"unit": "Unit 4", "question": "What does 'To be or not to be' commonly express?", "options": ["A) Indecision or hesitation", "B) Certainty about a decision", "C) Existential contemplation"], "answer": 2, "explanation": "\u9019\u662f\u54c8\u59c6\u96f7\u7279\u5c0d\u751f\u6b7b\u8207\u5b58\u5728\u610f\u7fa9\u7684\u6df1\u523b\u6c89\u601d\u3002", "image": "unit4.png"}, {"unit": "Unit 4", "question": "From which classic does this idiom originate?", "options": ["A) The Importance of Being Earnest", "B) Hamlet, by Shakespeare", "C) Tom Sawyer"], "answer": 1, "explanation": "\u51fa\u81ea\u838e\u58eb\u6bd4\u4e9e\u6700\u8457\u540d\u7684\u60b2\u5287\u300a\u54c8\u59c6\u96f7\u7279\u300b\u3002", "image": "u4q2.png"}, {"unit": "Unit 4", "question": "What main event occurs in the story of Hamlet?", "options": ["A) Fights with Horatio", "B) Travels around the world", "C) Mother remarries uncle Claudius"], "answer": 2, "explanation": "\u6545\u4e8b\u80cc\u666f\u662f\u54c8\u59c6\u96f7\u7279\u7684\u7236\u89aa\u53bb\u4e16\u5f8c\uff0c\u6bcd\u89aa\u6539\u5ac1\u7d66\u53d4\u53d4\u514b\u52de\u72c4\u65af\u3002", "image": "u4q3.png"}, {"unit": "Unit 4", "question": "What is the central theme of Hamlet's soliloquy?", "options": ["A) Joys of existence", "B) Life and death", "C) Afterlife"], "answer": 1, "explanation": "\u9019\u6bb5\u7368\u767d\u6838\u5fc3\u5728\u65bc\u63a2\u8a0e\u751f\u547d\u7684\u82e6\u96e3\u8207\u6b7b\u4ea1\u7684\u89e3\u812b\u3002", "image": "u4q4.png"}, {"unit": "Unit 4", "question": "What does 'TMI' typically indicate?", "options": ["A) Irrelevant details", "B) Excessive personal/private information", "C) Overloading with process details"], "answer": 1, "explanation": "TMI (Too Much Information) \u901a\u5e38\u6307\u5206\u4eab\u4e86\u904e\u591a\u4e0d\u5fc5\u8981\u7684\u96b1\u79c1\u3002", "image": "u4q5.png"}, {"unit": "Unit 5", "question": "From what linguistic category does 'Carpe Diem' borrow?", "options": ["A) Chinese", "B) Latin", "C) Korean"], "answer": 1, "explanation": "Carpe Diem \u662f\u62c9\u4e01\u8a9e\uff0c\u610f\u70ba\u300c\u53ca\u6642\u884c\u6a02\u300d\u3002", "image": "unit5.png"}, {"unit": "Unit 5", "question": "What does 'Carpe Diem' mean?", "options": ["A) Seize the opportunity", "B) Seize the day", "C) Seize power"], "answer": 1, "explanation": "\u5b57\u9762\u610f\u601d\u5c31\u662f Seize the day\uff08\u6293\u7dca\u4eca\u5929/\u53ca\u6642\u884c\u6a02\uff09\u3002", "image": "u5q2.png"}, {"unit": "Unit 5", "question": "Which of the following is also borrowed from Latin?", "options": ["A) Mahjong", "B) Emoji", "C) Et cetera"], "answer": 2, "explanation": "Et cetera (etc.) \u662f\u62c9\u4e01\u8a9e\uff0c\u610f\u601d\u662f\u300c\u4ee5\u53ca\u5176\u4ed6\u300d\u3002", "image": "https://images.unsplash.com/photo-1585336261022-680e295ce3fe?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 5", "question": "Which movie was introduced in this unit?", "options": ["A) Good Will Hunting", "B) A Beautiful Mind", "C) Dead Poets Society"], "answer": 2, "explanation": "\u300a\u6625\u98a8\u5316\u96e8\u300b(Dead Poets Society) \u662f\u63a8\u5ee3\u6b64\u7cbe\u795e\u6700\u8457\u540d\u7684\u96fb\u5f71\u3002", "image": "https://images.unsplash.com/photo-1577896851231-70ef18881754?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 5", "question": "Who acts the role of teacher Keating in the movie?", "options": ["A) Matt Damon", "B) Robin Williams", "C) Tom Cruise"], "answer": 1, "explanation": "\u7531\u7f85\u8cd3\u00b7\u5a01\u5ec9\u65af\uff08Robin Williams\uff09\u98fe\u6f14\u90a3\u4f4d\u555f\u767c\u5b78\u751f\u7684\u8001\u5e2b\u3002", "image": "https://images.unsplash.com/photo-1544717302-de2939b7ef71?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 6", "question": "What does the phrase 'Been there, done that' imply?", "options": ["A) Boredom or disinterest", "B) Accomplishment", "C) Experience and familiarity"], "answer": 2, "explanation": "\u9019\u500b\u7247\u8a9e\u7528\u4f86\u8868\u793a\u5c0d\u67d0\u4ef6\u4e8b\u975e\u5e38\u719f\u6089\uff0c\u56e0\u70ba\u81ea\u5df1\u5df2\u7d93\u7d93\u6b77\u904e\u4e86\u3002", "image": "https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 6", "question": "Who is the author of 'Carlito's Way' introduced in this unit?", "options": ["A) Edwin Torres", "B) Murakami Haruki", "C) Stephen King"], "answer": 0, "explanation": "Edwin Torres \u662f\u9019\u90e8\u72af\u7f6a\u5c0f\u8aaa\u7684\u4f5c\u8005\u3002", "image": "https://images.unsplash.com/photo-1512413914488-9bbdc2f5e3ba?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 6", "question": "What tense is used in the phrase 'Been there, done that'?", "options": ["A) Future perfect", "B) Past perfect", "C) Present perfect"], "answer": 2, "explanation": "\u9019\u662f\u73fe\u5728\u5b8c\u6210\u5f0f\uff08Present Perfect\uff09\u7684\u7701\u7565\u7528\u6cd5\u3002", "image": "https://images.unsplash.com/photo-1506784983877-45594efa4cbe?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 6", "question": "What does the perfect tense indicate?", "options": ["A) Past action with specific duration", "B) Completed action with ongoing relevance", "C) Future action with uncertainty"], "answer": 1, "explanation": "\u5b8c\u6210\u5f0f\u901a\u5e38\u8868\u793a\u52d5\u4f5c\u5df2\u7d93\u5b8c\u6210\uff0c\u4f46\u8207\u73fe\u5728\u4ecd\u6709\u95dc\u4fc2\u6216\u5f71\u97ff\u3002", "image": "https://images.unsplash.com/photo-1586281380349-632531db7ed4?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 6", "question": "The omission of subject/auxiliary in 'Been there...' is called?", "options": ["A) Phrase reduction", "B) Verb phrase", "C) Omission"], "answer": 2, "explanation": "\u5728\u53e3\u8a9e\u4e2d\u7701\u7565\u4e3b\u8a5e\u8207\u52a9\u52d5\u8a5e\u7684\u73fe\u8c61\u7a31\u70ba Omission\u3002", "image": "https://images.unsplash.com/photo-1508246473188-75f826dc4e0b?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 7", "question": "What is the meaning of 'Achilles' heel'?", "options": ["A) Physical strength", "B) Ancient footwear", "C) A fatal weakness"], "answer": 2, "explanation": "\u6e90\u81ea\u5e0c\u81d8\u795e\u8a71\uff0c\u6307\u5f37\u5927\u7684\u4eba\u8eab\u4e0a\u552f\u4e00\u7684\u81f4\u547d\u5f31\u9ede\u3002", "image": "https://images.unsplash.com/photo-1549487920-92850901e1ff?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 7", "question": "From which mythology does 'Achilles' heel' originate?", "options": ["A) Norse", "B) Greek", "C) Hindu"], "answer": 1, "explanation": "\u9019\u662f\u6700\u8457\u540d\u7684\u5e0c\u81d8\u795e\u8a71\u5178\u6545\u4e4b\u4e00\u3002", "image": "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 7", "question": "Who is the mother of Achilles?", "options": ["A) Thetis", "B) Hera", "C) Athena"], "answer": 0, "explanation": "\u6d77\u6d0b\u5973\u795e Thetis \u5c07\u963f\u57fa\u91cc\u65af\u6d78\u5165\u51a5\u6cb3\u4f7f\u4ed6\u5200\u69cd\u4e0d\u5165\uff0c\u9664\u4e86\u8173\u8e1d\u3002", "image": "https://images.unsplash.com/photo-1526362597401-49fc5120fc6c?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 7", "question": "Whose arrow pierced Achilles' heel in the Trojan war?", "options": ["A) Apollo", "B) Paris", "C) Hector"], "answer": 1, "explanation": "\u5e15\u91cc\u65af (Paris) \u5728\u963f\u6ce2\u7f85\u7684\u6307\u5f15\u4e0b\uff0c\u5c04\u4e2d\u4e86\u963f\u57fa\u91cc\u65af\u7684\u8173\u8e1d\u3002", "image": "https://images.unsplash.com/photo-1511215448103-625841029c5a?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 7", "question": "When was 'Achilles' heel' first used in English?", "options": ["A) 17th century", "B) 18th century", "C) 19th century"], "answer": 1, "explanation": "1810 \u5e74\u7531\u8a69\u4eba\u67ef\u52d2\u5f8b\u6cbb\u9996\u6b21\u4f7f\u7528\u3002", "image": "https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 8", "question": "What does 'Beware of Greeks bearing gifts' mean?", "options": ["A) Be cautious of unexpected generosity", "B) Trust known sources", "C) Avoid Greek customs"], "answer": 0, "explanation": "\u63d0\u9192\u4eba\u5011\u8981\u8b66\u60d5\u90a3\u4e9b\u770b\u4f3c\u597d\u610f\u3001\u80cc\u5f8c\u537b\u6709\u9670\u8b00\u7684\u79ae\u7269\u3002", "image": "unit8.png"}, {"unit": "Unit 8", "question": "From which story does this phrase originate?", "options": ["A) Peloponnesian War", "B) Trojan War", "C) Greco-Persian Wars"], "answer": 1, "explanation": "\u6e90\u81ea\u6728\u99ac\u5c60\u57ce\u8a18\uff08Trojan War\uff09\u7684\u6545\u4e8b\u3002", "image": "https://images.unsplash.com/photo-1603525281488-f2b1d7d0a64b?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 8", "question": "What was the gift bearing from Greeks?", "options": ["A) Golden crown", "B) Holy Grail", "C) Large wooden horse"], "answer": 2, "explanation": "\u5e0c\u81d8\u4eba\u7559\u4e0b\u7684\u5de8\u5927\u6728\u99ac\uff0c\u88e1\u9762\u85cf\u8457\u7cbe\u92b3\u58eb\u5175\u3002", "image": "https://images.unsplash.com/photo-1598380387550-e12458428131?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 8", "question": "Who acts the role of Achilles in the 2004 film Troy?", "options": ["A) Brad Pitt", "B) Paris Hilton", "C) Orlando Bloom"], "answer": 0, "explanation": "2004 \u5e74\u96fb\u5f71\u300a\u7279\u6d1b\u4f0a\u300b\u4e2d\uff0c\u7531\u5e03\u840a\u5fb7\u00b7\u5f7c\u7279\u98fe\u6f14\u963f\u57fa\u91cc\u65af\u3002", "image": "https://images.unsplash.com/photo-1599839619722-39751411ea63?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 8", "question": "What consequence did the Trojans face from the gift?", "options": ["A) Victory", "B) Destruction of Troy", "C) Alliance with Greece"], "answer": 1, "explanation": "\u7279\u6d1b\u4f0a\u4eba\u5c07\u6728\u99ac\u62c9\u5165\u57ce\u5167\uff0c\u5c0e\u81f4\u57ce\u5e02\u5728\u591c\u665a\u88ab\u653b\u7834\u6bc0\u6ec5\u3002", "image": "https://images.unsplash.com/photo-1603525281488-f2b1d7d0a64b?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 9", "question": "What do Electra and Oedipus complexes refer to?", "options": ["A) Sibling rivalry", "B) Psychoanalytic concepts (Freud)", "C) Identity crisis"], "answer": 1, "explanation": "\u4f5b\u6d1b\u4f0a\u5fb7\u63d0\u51fa\u7684\u5fc3\u7406\u5206\u6790\u6982\u5ff5\uff0c\u5206\u5225\u6307\u6200\u7236\u8207\u6200\u6bcd\u60c5\u7d50\u3002", "image": "https://images.unsplash.com/photo-1565103642398-3fb54f1de265?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 9", "question": "Which characters are linked to Electra and Oedipus?", "options": ["A) Agamemnon and Clytemnestra", "B) Electra and Achilles", "C) Oedipus and Antigone"], "answer": 0, "explanation": "\u9019\u4e9b\u5fc3\u7406\u6982\u5ff5\u6e90\u81ea\u65bc\u5e0c\u81d8\u60b2\u5287\u4e2d\u7684\u5bb6\u5ead\u502b\u7406\u6545\u4e8b\u3002", "image": "https://images.unsplash.com/photo-1565103642398-3fb54f1de265?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 9", "question": "What is the significance of the figure Prometheus?", "options": ["A) God of water", "B) Hero who benefits humanity", "C) Symbol of wealth"], "answer": 1, "explanation": "\u666e\u7f85\u7c73\u4fee\u65af\u76dc\u53d6\u5929\u706b\u7d66\u4eba\u985e\uff0c\u8c61\u5fb5\u70ba\u4eba\u985e\u5229\u76ca\u81ea\u6211\u72a7\u7272\u7684\u82f1\u96c4\u3002", "image": "https://images.unsplash.com/photo-1498305364177-d64e0300edc7?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 9", "question": "What is the story behind Pandora's box?", "options": ["A) Forbidden love", "B) Creation of world", "C) Curiosity and disobedience"], "answer": 2, "explanation": "\u6f58\u6735\u62c9\u56e0\u597d\u5947\u6253\u958b\u76d2\u5b50\uff0c\u91cb\u653e\u4e86\u707d\u96e3\uff0c\u4f46\u4e5f\u7559\u4e0b\u4e86\u300c\u5e0c\u671b\u300d\u3002", "image": "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&q=80&w=800"}, {"unit": "Unit 9", "question": "What is the story of Narcissus and Echo about?", "options": ["A) Forbidden love", "B) Vanity and self-absorption", "C) Epic journey"], "answer": 1, "explanation": "\u7d0d\u897f\u745f\u65af\u611b\u4e0a\u81ea\u5df1\u7684\u5012\u5f71\uff0c\u662f\u300c\u81ea\u6200\u300d(Narcissism) \u4e00\u8a5e\u7684\u7531\u4f86\u3002", "image": "https://images.unsplash.com/photo-1503173778235-9cb1dd3b378e?auto=format&fit=crop&q=80&w=800"}];
        let cur = 0, score = 0, mis = [], locked = false;

        function startQuiz() {
            unlockAudio(); // 在首次點擊時強制解鎖音效引擎
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-box').style.display = 'block';
            show();
        }

        // 語音朗讀系統 (TTS)
        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); // 停止之前的朗讀
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9; // 稍微放慢一點，聽起來更親切
            msg.pitch = 1.1; // 稍微調高音調，聽起來更甜美
            
            // 試圖尋找女聲
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => 
                (v.name.includes('Female') || v.name.includes('Google US English') || v.name.includes('Samantha') || v.name.includes('Microsoft Zira')) && v.lang.includes('en')
            );
            if (femaleVoice) msg.voice = femaleVoice;
            
            window.speechSynthesis.speak(msg);
        }

        function show() {
            locked = false; const q = data[cur];
            document.getElementById('pb').style.width = (cur/data.length)*100 + '%';
            document.getElementById('q-content').innerHTML = `
                <div class="quiz-card">
                    <span class="badge">${q.unit}</span>
                    <img src="${q.image}" class="q-img" onerror="this.style.display='none'">
                    <div class="q-text">${q.question}</div>
                    <div class="options">
                        ${q.options.map((o, i) => `<div class="opt" onclick="check(${i})">${o}</div>`).join('')}
                    </div>
                    <div class="exp" id="ex"><strong>解析：</strong>${q.explanation}</div>
                </div>
            `;
            document.getElementById('nb').style.display = 'none';
            
            // 自動朗讀題目 (延遲一下確保介面已渲染)
            setTimeout(() => speak(q.question), 500);
        }
        function check(i) {
            if(locked) return; locked = true;
            initAudio(); // 再次確保音效引擎啟動
            const q = data[cur], opts = document.querySelectorAll('.opt');
            if(i === q.answer) { opts[i].classList.add('correct'); score++; playSound('correct'); }
            else { 
                opts[i].classList.add('wrong'); opts[q.answer].classList.add('correct'); 
                mis.push({q:q.question, a:q.options[q.answer], e:q.explanation}); 
                playSound('wrong');
            }
            document.getElementById('ex').style.display = 'block';
            document.getElementById('nb').style.display = 'block';
        }
        function next() {
            cur++; if(cur < data.length) show(); else end();
        }
        function end() {
            document.getElementById('quiz-box').style.display='none';
            document.getElementById('res-box').style.display='block';
            document.getElementById('sv').innerText = Math.round((score/data.length)*100);
            if(mis.length > 0) {
                document.getElementById('mis-list').innerHTML = '<h4>Review Mistakes:</h4>' + 
                mis.map(m => `<div class="mis-item"><b>${m.q}</b><br><span style="color:#22c55e">Ans: ${m.a}</span><br><small>${m.e}</small></div>`).join('');
            }
        }
        // show(); <-- 移除這行，改由 startQuiz() 觸發
    </script>
</body>
</html>
