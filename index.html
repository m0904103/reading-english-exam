<!DOCTYPE html>

<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>?жўҜ??жңӣ?ж‘®иұў???- зҡңзҘҮ?ж’Ңи„©???/title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .message-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 80%;
            z-index: 10;
        }
        h1 { color: #ef4444; }
        p { font-size: 1.2rem; line-height: 1.6; color: #cbd5e1; }
        .countdown {
            font-size: 5rem;
            font-weight: bold;
            color: #fbbf24;
            margin: 20px 0;
        }
        .explosion {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('https://media.giphy.com/media/HhTXt43pk1I1W/giphy.gif') no-repeat center center;
            background-size: cover;
            z-index: 100;
            display: none;
        }
        .destroyed {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #ef4444;
            font-size: 3.5rem;
            font-weight: bold;
            z-index: 101;
            text-shadow: 2px 2px 10px #000;
            letter-spacing: 5px;
            width: 100%;
        }
        .btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>
    <div class="message-box" id="box">
        <h1>?оәЁ? ?оёҖи‘ү?пҒёеІ«ж’Ңи„©???/h1>
        <p>?зҘҶи‘«ж’ҪоӨӣйӣҜ?ој»жӯҮж‘°п—»??оҺ•жҢҫ?жүҫйҒҷ?о©‘ВҖ?/p>
        <p>йҡўп•қ??е•ңВҖп—әпҸійҡӨи„ҜВҖпҡҷеҢұиқҘп—әйЈӣиқ§оҳ’?<br>?оёӮоҜ°?пҒ·еҢұиқҘп—ә?зҳқе°Қ?</p>
        <div class="countdown" id="count">10</div>
        <button class="btn" id="start-btn">жҡәоөҘ??оёҒ??з‘ҹ?иқ”п•қ?</button>
    </div>

    <div class="explosion" id="boom"></div>
    <div class="destroyed" id="text-boom">иқ¬и„Ө?ж’Ңи„ЈеҷЁж‘ЁоҹЎоҫ«зҳҘВҖ</div>

    <script>
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-btn').style.display = 'none';
            let c = 10;
            
            const speak = (text) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-TW';
                u.rate = 1.0;
                u.pitch = 0.8;
                window.speechSynthesis.speak(u);
            };

            const timer = setInterval(() => {
                document.getElementById('count').innerText = c;
                speak(c.toString());
                
                if (c === 0) {
                    clearInterval(timer);
                    setTimeout(() => {
                        // ?еүңоңӣ?пүҺоҫ«?е–®?
                        const audio = new Audio('https://www.soundjay.com/mechanical/sounds/explosion-01.mp3');
                        audio.volume = 1.0;
                        audio.play().catch(e => console.log('Audio error:', e));
                        
                        document.getElementById('box').style.display = 'none';
                        document.getElementById('boom').style.display = 'block';
                        
                        setTimeout(() => {
                            document.getElementById('text-boom').style.display = 'block';
                            document.getElementById('boom').style.opacity = '0.3';
                        }, 2000);
                    }, 800);
                }
                c--;
            }, 1000);
        });
    </script>
</body>
</html>
